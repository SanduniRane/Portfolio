version: "3.9"

# Invoice Processing Pipeline — Full Stack
# Run the entire system with: docker-compose up
# Dashboard will be available at: http://localhost:5000

services:

  # ── Pipeline worker (Layers 1–5) ────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice_pipeline
    volumes:
      - ./sample_invoices:/app/sample_invoices   # PDF inbox (mount your invoices here)
      - ./logs:/app/logs                          # Raw text extraction logs
      - ./data:/app/data                          # SQLite database
    environment:
      # Email settings — override with your real credentials
      - IMAP_HOST=${IMAP_HOST:-imap.gmail.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - EMAIL_USER=${EMAIL_USER:-your_email@gmail.com}
      - EMAIL_PASS=${EMAIL_PASS:-your_app_password}
      - WATCH_FOLDER=${WATCH_FOLDER:-INBOX}
      - DOWNLOAD_DIR=/app/sample_invoices
      - DB_PATH=/app/data/invoices.db
    command: python run_pipeline.py
    restart: "no"           # Run once; change to 'always' for continuous polling

  # ── Dashboard (Layer 6) ─────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice_dashboard
    volumes:
      - ./data:/app/data    # Shared SQLite database with pipeline service
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/invoices.db
    command: python dashboard/app.py
    ports:
      - "5000:5000"         # Open http://localhost:5000 in your browser
    depends_on:
      - pipeline
    restart: unless-stopped
